<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Generator</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(180deg, #f5f5f5 0%, #eef2f7 100%);
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #e6e6e6;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        button {
            display: block;
            margin: 20px auto;
            padding: 12px 24px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #quoteDisplay {
            margin-top: 30px;
            padding: 20px;
            min-height: 100px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-left: 4px solid #4CAF50;
            border-radius: 4px;
            font-size: 18px;
            line-height: 1.6;
            color: #333;
            white-space: pre-wrap;
            font-style: italic;
        }
        .loading {
            color: #666;
            font-style: italic;
        }
        .error {
            color: #d32f2f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Quote Generator</h1>
        <button id="generateBtn" onclick="generateQuote()">Generate Quote</button>
        <div id="quoteDisplay">Click the button to generate a quote!</div>
    </div>

    <script>
        async function generateQuote() {
            const button = document.getElementById('generateBtn');
            const display = document.getElementById('quoteDisplay');
            
            // Disable button and show loading
            button.disabled = true;
            display.textContent = 'Loading...';
            display.className = 'loading';
            
            try {
                // Call the API
                const response = await fetch('/api/quote');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Display the quote
                display.textContent = data.quote;
                display.className = '';
                
            } catch (error) {
                // Handle errors
                display.textContent = `Error: ${error.message}`;
                display.className = 'error';
            } finally {
                // Re-enable button
                button.disabled = false;
            }
        }
    </script>
</body>
</html>
